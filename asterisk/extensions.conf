; =============================================================
; Asterisk Dialplan for Call Center
; =============================================================

[general]
static=yes
writeprotect=no

; --- Internal context (agent-to-agent calls) ---
[from-internal]
exten => _X.,1,NoOp(Internal call to ${EXTEN})
 same => n,Dial(PJSIP/${EXTEN},30)
 same => n,Hangup()

; --- Inbound from SIP trunk ---
[from-trunk]
exten => _X.,1,NoOp(Inbound call from ${CALLERID(num)} to ${EXTEN})
 same => n,Answer()
 same => n,Set(CDR(direction)=inbound)
 ; Route to ARI stasis app
 same => n,Stasis(callcenter)
 same => n,Hangup()

; Catch-all for inbound
exten => s,1,NoOp(Inbound call - no extension)
 same => n,Answer()
 same => n,Stasis(callcenter)
 same => n,Hangup()

; --- Outbound dialer context ---
[from-dialer]
exten => s,1,NoOp(Dialer call to ${CALLERID(dnid)})
 ; AMD if enabled
 same => n,GotoIf($["${AMD_ENABLED}" = "1"]?amd:stasis)
 same => n(amd),AMD(2500,1500,800,5000)
 same => n,Set(AMD_STATUS=${AMDSTATUS})
 same => n,Set(AMD_CAUSE=${AMDCAUSE})
 same => n(stasis),Stasis(callcenter)
 same => n,Hangup()

exten => _X.,1,NoOp(Dialer outbound to ${EXTEN})
 same => n,GotoIf($["${AMD_ENABLED}" = "1"]?amd:stasis)
 same => n(amd),AMD(2500,1500,800,5000)
 same => n,Set(AMD_STATUS=${AMDSTATUS})
 same => n,Set(AMD_CAUSE=${AMDCAUSE})
 same => n(stasis),Stasis(callcenter)
 same => n,Hangup()

; --- Recording subroutine ---
[sub-record]
exten => s,1,Set(RECORDING_FILE=${STRFTIME(${EPOCH},,%Y%m%d-%H%M%S)}-${UNIQUEID})
 same => n,MixMonitor(/var/spool/asterisk/monitor/${RECORDING_FILE}.wav,b)
 same => n,Return()
