; =============================================================
; PJSIP Configuration for Call Center
; =============================================================
; Transports are defined here (static).
; Endpoints, auths, and AORs are managed via Realtime (PostgreSQL).
; =============================================================

; --- UDP Transport (for SIP trunks) ---
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
local_net=10.0.0.0/8
local_net=172.16.0.0/12
local_net=192.168.0.0/16
external_media_address=__EXTERNAL_IP__
external_signaling_address=__EXTERNAL_IP__

; --- WSS Transport (for WebRTC agents) ---
[transport-wss]
type=transport
protocol=wss
bind=0.0.0.0

; --- TLS Transport (optional, for SIP over TLS) ---
[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
cert_file=/etc/letsencrypt/live/__DOMAIN__/fullchain.pem
priv_key_file=/etc/letsencrypt/live/__DOMAIN__/privkey.pem
method=tlsv1_2

; =============================================================
; NOTE: Agent endpoints and trunk endpoints are stored in
; PostgreSQL via Asterisk Realtime (see extconfig.conf).
; They are NOT defined here.
; =============================================================
